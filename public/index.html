<!DOCTYPE html>
<html>
<head>
    <title>تواصل</title>
</head>
<body>
    <h1>تواصل</h1>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">تسجيل الدخول</button>
    <button onclick="register()">إنشاء حساب</button>

    <div id="message"></div>

    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('message').innerHTML = '❌ الرجاء ملء جميع الحقول';
                return;
            }
            document.getElementById('message').innerHTML = '✅ جاري تسجيل الدخول...';
            // هنا يمكن إضافة اتصال بالخادم لاحقاً
        }

        function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('message').innerHTML = '❌ الرجاء ملء جميع الحقول';
                return;
            }
            document.getElementById('message').innerHTML = '✅ جاري إنشاء الحساب...';
            // هنا يمكن إضافة اتصال بالخادم لاحقاً
        }
    </script>
</body>
</html>
