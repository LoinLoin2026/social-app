<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💬 تواصل – تسجيل الدخول</title>

    <!-- ===== PWA ===== -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="theme-color" content="#00bcd4">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: #121212;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .auth-container h1 {
            text-align: center;
            color: #00bcd4;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .auth-container p {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .input-group input, .input-group select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 12px 18px;
            color: #e0e0e0;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #00bcd4;
        }
        .input-group input[type="file"] {
            padding: 8px;
            border-radius: 30px;
            background: #0a0a0a;
            color: #aaa;
        }
        .input-group .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #00bcd4;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            overflow: hidden;
            font-size: 30px;
            color: #888;
        }
        .input-group .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            width: 100%;
            background: #00bcd4;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 5px;
        }
        .btn:hover {
            background: #0097a7;
            transform: scale(1.02);
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
        .link span {
            color: #00bcd4;
            cursor: pointer;
        }
        .link span:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }
        .error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }
        .success {
            color: #00bcd4;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .input-group {
            flex: 1;
        }

        /* ===== واجهة الدردشة ===== */
        .chat-container {
            max-width: 500px;
            width: 100%;
            background: #121212;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            height: 90vh;
            margin: auto;
        }
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .chat-header h1 {
            font-size: 22px;
            color: #00bcd4;
        }
        .chat-header .status {
            font-size: 12px;
            color: #00bcd4;
            background: #1a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #00bcd444;
        }
        #messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px 0;
            margin-bottom: 12px;
            border-top: 1px solid #2a2a2a;
            border-bottom: 1px solid #2a2a2a;
        }
        .msg {
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        .msg.sent {
            background: #00bcd4;
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.received {
            background: #1e1e1e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }
        .msg .user {
            font-weight: 600;
            font-size: 12px;
            color: #00bcd4;
            margin-bottom: 2px;
        }
        .msg .time {
            font-size: 10px;
            color: #888;
            text-align: right;
            margin-top: 4px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 30px;
            padding: 12px 18px;
            color: #e0e0e0;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }
        .input-area input:focus {
            border-color: #00bcd4;
        }
        .input-area button {
            background: #00bcd4;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        .input-area button:hover {
            background: #0097a7;
            transform: scale(1.02);
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #ff6b6b44;
            color: #ff6b6b;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #ff6b6b22;
        }
    </style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div id="authContainer" class="auth-container">
    <h1>💬 تواصل</h1>
    <p>سجل الدخول للدردشة مع أصدقائك</p>

    <div id="loginForm">
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور">
        </div>
        <button class="btn" onclick="loginUser()">تسجيل الدخول</button>
        <div class="link">ليس لديك حساب؟ <span onclick="showRegister()">إنشاء حساب</span></div>
        <div id="loginError" class="error"></div>
    </div>

    <div id="registerForm" class="hidden">
        <div class="input-group">
            <label>الصورة الشخصية</label>
            <div class="avatar-preview" id="avatarPreview">👤</div>
            <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar(event)">
        </div>
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="registerUsername" placeholder="اختر اسم مستخدم">
        </div>
        <div class="input-group">
            <label>البريد الإلكتروني (اختياري)</label>
            <input type="email" id="registerEmail" placeholder="example@email.com">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="registerPassword" placeholder="اختر كلمة مرور">
        </div>
        <div class="row">
            <div class="input-group">
                <label>اليوم</label>
                <select id="regDay">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                    <option value="13">13</option><option value="14">14</option><option value="15">15</option>
                    <option value="16">16</option><option value="17">17</option><option value="18">18</option>
                    <option value="19">19</option><option value="20">20</option><option value="21">21</option>
                    <option value="22">22</option><option value="23">23</option><option value="24">24</option>
                    <option value="25">25</option><option value="26">26</option><option value="27">27</option>
                    <option value="28">28</option><option value="29">29</option><option value="30">30</option>
                    <option value="31">31</option>
                </select>
            </div>
            <div class="input-group">
                <label>الشهر</label>
                <select id="regMonth">
                    <option value="1">يناير</option><option value="2">فبراير</option>
                    <option value="3">مارس</option><option value="4">أبريل</option>
                    <option value="5">مايو</option><option value="6">يونيو</option>
                    <option value="7">يوليو</option><option value="8">أغسطس</option>
                    <option value="9">سبتمبر</option><option value="10">أكتوبر</option>
                    <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
                </select>
            </div>
            <div class="input-group">
                <label>السنة</label>
                <select id="regYear"></select>
            </div>
        </div>
        <button class="btn" onclick="registerUser()">إنشاء حساب</button>
        <div class="link">لديك حساب؟ <span onclick="showLogin()">تسجيل الدخول</span></div>
        <div id="registerError" class="error"></div>
        <div id="registerSuccess" class="success"></div>
    </div>
</div>

<!-- ===== واجهة الدردشة ===== -->
<div id="chatContainer" class="chat-container hidden">
    <div class="chat-header">
        <h1>💬 تواصل</h1>
        <div>
            <span class="status" id="status">🟢 متصل</span>
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
        </div>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    // ===== تعبئة سنوات الميلاد =====
    (function fillYears() {
        const select = document.getElementById('regYear');
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= 1900; y--) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            select.appendChild(option);
        }
    })();

    // ===== معاينة الصورة =====
    function previewAvatar(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('avatarPreview');
                preview.innerHTML = `<img src="${e.target.result}" alt="صورة">`;
            };
            reader.readAsDataURL(file);
        }
    }

    // ===== تبديل الشاشات =====
    function showRegister() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('loginError').textContent = '';
        document.getElementById('registerError').textContent = '';
        document.getElementById('registerSuccess').textContent = '';
    }

    function showLogin() {
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('loginError').textContent = '';
        document.getElementById('registerError').textContent = '';
        document.getElementById('registerSuccess').textContent = '';
    }

    // ===== اتصال Socket.io =====
    const socket = io('https://social-app-uljs.onrender.com');
    let currentUser = '';

    // ===== تسجيل الدخول =====
    function loginUser() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorDiv = document.getElementById('loginError');

        if (!username || !password) {
            errorDiv.textContent = 'الرجاء ملء جميع الحقول';
            return;
        }

        socket.emit('login', { username, password });
    }

    // ===== إنشاء حساب =====
    function registerUser() {
        const username = document.getElementById('registerUsername').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value.trim();
        const day = document.getElementById('regDay').value;
        const month = document.getElementById('regMonth').value;
        const year = document.getElementById('regYear').value;
        const avatarPreview = document.getElementById('avatarPreview');

        const errorDiv = document.getElementById('registerError');
        const successDiv = document.getElementById('registerSuccess');

        if (!username || !password) {
            errorDiv.textContent = 'الرجاء ملء اسم المستخدم وكلمة المرور';
            successDiv.textContent = '';
            return;
        }

        let avatar = '';
        const img = avatarPreview.querySelector('img');
        if (img) {
            avatar = img.src;
        }

        socket.emit('register', {
            username,
            password,
            email,
            birthday: `${day}/${month}/${year}`,
            avatar
        });
    }

    // ===== أحداث Socket =====
    socket.on('loginSuccess', (data) => {
        currentUser = data.username;
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('chatContainer').classList.remove('hidden');
        document.getElementById('status').innerHTML = '🟢 ' + currentUser;
        document.getElementById('loginError').textContent = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginUsername').value = '';
    });

    socket.on('loginError', (msg) => {
        document.getElementById('loginError').textContent = msg;
    });

    socket.on('registerSuccess', (msg) => {
        document.getElementById('registerSuccess').textContent = msg;
        document.getElementById('registerError').textContent = '';
        document.getElementById('registerUsername').value = '';
        document.getElementById('registerEmail').value = '';
        document.getElementById('registerPassword').value = '';
        document.getElementById('avatarPreview').innerHTML = '👤';
        document.getElementById('avatarInput').value = '';
        setTimeout(() => {
            showLogin();
        }, 2000);
    });

    socket.on('registerError', (msg) => {
        document.getElementById('registerError').textContent = msg;
        document.getElementById('registerSuccess').textContent = '';
    });

    // ===== تحميل الرسائل السابقة =====
    socket.on('loadMessages', (messages) => {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '';
        messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg received';
            msgDiv.innerHTML = `
                <div class="user">${msg.username || msg.user}</div>
                <div>${msg.message}</div>
                <div class="time">${msg.time}</div>
            `;
            messagesDiv.appendChild(msgDiv);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // ===== استقبال رسالة جديدة =====
    socket.on('receiveMessage', (data) => {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg received';
        msgDiv.innerHTML = `
            <div class="user">${data.username || data.user}</div>
            <div>${data.message}</div>
            <div class="time">${data.time}</div>
        `;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // ===== إرسال رسالة =====
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const message = input.value.trim();
        if (!message || !currentUser) return;

        socket.emit('sendMessage', {
            user: currentUser,
            message: message
        });

        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg sent';
        msgDiv.innerHTML = `
            <div>${message}</div>
            <div class="time">${new Date().toLocaleTimeString()}</div>
        `;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        input.value = '';
    }

    // ===== تسجيل الخروج =====
    function logout() {
        socket.disconnect();
        document.getElementById('chatContainer').classList.add('hidden');
        document.getElementById('authContainer').classList.remove('hidden');
        currentUser = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
        document.getElementById('messages').innerHTML = '';
    }

    // ===== دعم Enter =====
    document.getElementById('loginPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loginUser();
    });
    document.getElementById('registerPassword').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') registerUser();
    });
    document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
