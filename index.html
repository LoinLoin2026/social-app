        .opt:hover { background: #3a4758; border-color: #6a8cff; }
        .opt.correct { background: #1f8b4c; border-color: #2ecc71; }
        .opt.wrong { background: #8b1f2e; border-color: #ff4757; }
        #next-btn { margin-top: 18px; background: #2d6cff; border: none; color: white; padding: 14px; border-radius: 60px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #next-btn:hover { background: #1a4fcc; }
        #progress { margin-top: 12px; display: flex; justify-content: space-between; font-size: 14px; color: #8895aa; }

    function speakHuman(text) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.85;
        u.pitch = 1.0;
        u.volume = 1;
        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('en')) || voices[0];
        if (v) u.voice = v;
        window.speechSynthesis.speak(u);
    }

            { q: 'Pear', sub: 'كمثرى', options: ['كمثرى', 'تفاحة', 'موزة', 'برتقالة'], correct: 'كمثرى' },
            { q: 'Cherry', sub: 'كرز', options: ['كرز', 'تفاحة', 'موزة', 'برتقالة'], correct: 'كرز' },
            { q: 'Water', sub: 'ماء', options: ['ماء', 'حليب', 'عصير', 'شاي'], correct: 'ماء' },
            { q: 'Milk', sub: 'حليب', options: ['حليب', 'ماء', 'عصير', 'قهوة'], correct: 'حليب' },
            { q: 'Juice', sub: 'عصير', options: ['عصير', 'ماء', 'حليب', 'شاي'], correct: 'عصير' },
            { q: 'Tea', sub: 'شاي', options: ['شاي', 'قهوة', 'عصير', 'حليب'], correct: 'شاي' },
            { q: 'Coffee', sub: 'قهوة', options: ['قهوة', 'شاي', 'عصير', 'حليب'], correct: 'قهوة' },
            { q: 'Bread', sub: 'خبز', options: ['خبز', 'جبن', 'لحم', 'فاكهة'], correct: 'خبز' },
            { q: 'Cheese', sub: 'جبن', options: ['جبن', 'خبز', 'لحم', 'فاكهة'], correct: 'جبن' },
            { q: 'Meat', sub: 'لحم', options: ['لحم', 'جبن', 'خبز', 'فاكهة'], correct: 'لحم' },
            { q: 'Chicken', sub: 'دجاج', options: ['دجاج', 'لحم', 'سمك', 'بيض'], correct: 'دجاج' },
            { q: 'Fish', sub: 'سمك', options: ['سمك', 'دجاج', 'لحم', 'بيض'], correct: 'سمك' },
            { q: 'Egg', sub: 'بيض', options: ['بيض', 'دجاج', 'سمك', 'لحم'], correct: 'بيض' },
            { q: 'Rice', sub: 'أرز', options: ['أرز', 'خبز', 'معكرونة', 'بطاطس'], correct: 'أرز' },
            { q: 'Pasta', sub: 'معكرونة', options: ['معكرونة', 'أرز', 'خبز', 'بطاطس'], correct: 'معكرونة' },
            { q: 'Potato', sub: 'بطاطس', options: ['بطاطس', 'أرز', 'معكرونة', 'خبز'], correct: 'بطاطس' },
            { q: 'Tomato', sub: 'طماطم', options: ['طماطم', 'بطاطس', 'بصل', 'خيار'], correct: 'طماطم' },
            { q: 'Onion', sub: 'بصل', options: ['بصل', 'طماطم', 'خيار', 'فلفل'], correct: 'بصل' },
            { q: 'Cucumber', sub: 'خيار', options: ['خيار', 'طماطم', 'بصل', 'فلفل'], correct: 'خيار' },
            { q: 'Pepper', sub: 'فلفل', options: ['فلفل', 'خيار', 'طماطم', 'بصل'], correct: 'فلفل' },
            { q: 'Carrot', sub: 'جزر', options: ['جزر', 'بطاطس', 'بصل', 'خيار'], correct: 'جزر' },
            { q: 'Lettuce', sub: 'خس', options: ['خس', 'جزر', 'طماطم', 'خيار'], correct: 'خس' },
            { q: 'Cabbage', sub: 'كرنب', options: ['كرنب', 'خس', 'جزر', 'بطاطس'], correct: 'كرنب' },
            { q: 'Garlic', sub: 'ثوم', options: ['ثوم', 'بصل', 'فلفل', 'جزر'], correct: 'ثوم' },
            { q: 'Ginger', sub: 'زنجبيل', options: ['زنجبيل', 'ثوم', 'بصل', 'فلفل'], correct: 'زنجبيل' },
        ]},
    ];

    // ============================================================
    // التطبيق
    // ============================================================
    let currentFolder = 0;
    let currentIndexInFolder = 0;
    let score = 0;
    let currentLesson = null;
    let answered = false;
    let totalLessonsInFolder = 0;

    const questionEl = document.getElementById('question');
    const subInfoEl = document.getElementById('sub-info');
    const optionsEl = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const folderNameEl = document.getElementById('folder-name');
    const lessonNum = document.getElementById('lesson-num');
    const totalLessonsEl = document.getElementById('total-lessons');
    const scoreEl = document.getElementById('score');
    const feedbackEl = document.getElementById('feedback');
    const speakBtn = document.getElementById('speak-btn');
    const progressFill = document.getElementById('progress-fill');
    const folderBtns = document.querySelectorAll('.folder-btn');

    function updateFolderUI() {
        folderBtns.forEach((btn, i) => {
            btn.classList.toggle('active', i === currentFolder);
        });
        folderNameEl.textContent = FOLDERS[currentFolder].name;
        totalLessonsInFolder = FOLDERS[currentFolder].lessons.length;
        totalLessonsEl.textContent = totalLessonsInFolder;
        currentIndexInFolder = 0;
        score = 0;
        scoreEl.textContent = '0';
        loadLesson();
    }

    function loadLesson() {
        const folder = FOLDERS[currentFolder];
        const lessons = folder.lessons;
        if (currentIndexInFolder >= lessons.length) {
            questionEl.innerHTML = '🎉 أكملت هذا المجلد!';
            optionsEl.innerHTML = '';
            subInfoEl.textContent = '';
            nextBtn.textContent = '🔄 إعادة';
            feedbackEl.textContent = '';
            speakBtn.classList.add('hidden');
            progressFill.style.width = '100%';
            return;
        }
        const lesson = lessons[currentIndexInFolder];
        currentLesson = lesson;
        answered = false;
        questionEl.textContent = lesson.q;
        subInfoEl.textContent = lesson.sub || '';
        lessonNum.textContent = currentIndexInFolder + 1;
        progressFill.style.width = `${(currentIndexInFolder / lessons.length) * 100}%`;
        const shuffled = [...lesson.options].sort(() => Math.random() - 0.5);
        optionsEl.innerHTML = '';
        shuffled.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.textContent = opt;
            div.onclick = () => selectOption(div, opt, lesson.correct);
            optionsEl.appendChild(div);
        });
        feedbackEl.textContent = '';
        speakBtn.classList.remove('hidden');
        nextBtn.textContent = '▶ التالي';
        // نطق تلقائي
        speakHuman(lesson.q);
    }

    function selectOption(el, selected, correct) {
        if (answered) return;
        answered = true;
        const allOpts = document.querySelectorAll('.opt');
        allOpts.forEach(o => o.style.pointerEvents = 'none');
        if (selected === correct) {
            el.classList.add('correct');
            feedbackEl.textContent = '✅ صحيح!';
            feedbackEl.style.color = '#2ecc71';
            score++;
            scoreEl.textContent = score;
        } else {
            el.classList.add('wrong');
            feedbackEl.textContent = `❌ خطأ. الإجابة: ${correct}`;
            feedbackEl.style.color = '#ff4757';
            allOpts.forEach(o => {
                if (o.textContent === correct) o.classList.add('correct');
            });
        }
        speakHuman(currentLesson.q);
    }

    speakBtn.onclick = () => {
        if (currentLesson) {
            speakHuman(currentLesson.q);
            feedbackEl.textContent = '🔊 جاري التشغيل...';
            feedbackEl.style.color = '#6a8cff';
        }
    };

    nextBtn.onclick = () => {
        const lessons = FOLDERS[currentFolder].lessons;
        if (currentIndexInFolder < lessons.length - 1) {
            currentIndexInFolder++;
            loadLesson();
        } else {
            currentIndexInFolder = 0;
            score = 0;
            scoreEl.textContent = '0';
            loadLesson();
        }
    };

    folderBtns.forEach((btn, idx) => {
        btn.onclick = () => {
            currentFolder = idx;
            updateFolderUI();
        };
    });

    if ('speechSynthesis' in window) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    }

    updateFolderUI();

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            nextBtn.click();
        }
    });
</script>
</body>
</html>
